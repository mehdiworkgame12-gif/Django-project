<!DOCTYPE html>
<html lang="en">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }


        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:#f2f2f2;

        }


        .login-box{

            width:350px;

            padding:30px;

            background:white;

            border-radius:15px;

            box-shadow:0 10px 25px rgba(0,0,0,.15);

        }


        h2{

            text-align:center;

            margin-bottom:25px;

        }


        .message{

            color:red;

            text-align:center;

            margin-bottom:15px;

        }


        label{

            display:block;

            margin-bottom:5px;

        }


        input{

            width:100%;

            padding:12px;

            margin-bottom:15px;

            border:1px solid #ccc;

            border-radius:8px;

        }


        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:8px;

            background:#007bff;

            color:white;

            font-size:16px;

            cursor:pointer;

        }


        button:hover{

            background:#0056b3;

        }


        .signup{

            text-align:center;

            margin-top:20px;

        }


        a{

            color:#007bff;

            text-decoration:none;

        }


    </style>

</head>


<body>


<div class="login-box">


    <h2>Login</h2>


    {% if msg %}

        <p class="message">
            {{ msg }}
        </p>

    {% endif %}



    <form method="POST">

        {% csrf_token %}


        <label>
            Username
        </label>

        <input 
        type="text" 
        name="username"
        placeholder="Enter username">



        <label>
            Password
        </label>

        <input 
        type="password" 
        name="password"
        placeholder="Enter password">



        <button type="submit">
            Login
        </button>


    </form>



    <div class="signup">

        Don't have an account?

        <a href="{% url 'accounts:signup' %}">
    Signup
</a>

    </div>


</div>


</body>

</html>
